services:
  postgres:
    image: postgres:18.4-alpine
    profiles: ["control-plane"]
    environment:
      POSTGRES_DB: aigateway
      POSTGRES_USER: aigateway
      POSTGRES_PASSWORD: aigateway-local
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigateway -d aigateway"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 15

  prometheus:
    image: prom/prometheus:v3.12.0
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    secrets:
      - aigw_metrics_token
    depends_on:
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 5s
      timeout: 2s
      retries: 30

  alertmanager:
    image: prom/alertmanager:v0.32.1
    profiles: ["observability"]
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9093/-/ready"]
      interval: 5s
      timeout: 2s
      retries: 30

  grafana:
    image: grafana/grafana:13.1.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-local-admin-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 5s
      timeout: 2s
      retries: 30

  promtool:
    image: prom/prometheus:v3.12.0
    profiles: ["tools"]
    entrypoint: ["promtool"]
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
    secrets:
      - aigw_metrics_token

  amtool:
    image: prom/alertmanager:v0.32.1
    profiles: ["tools"]
    entrypoint: ["amtool"]
    volumes:
      - ./observability/alertmanager:/etc/alertmanager:ro

volumes:
  postgres-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:

secrets:
  aigw_metrics_token:
    file: ${METRICS_TOKEN_FILE:-./observability/secrets/metrics-token.dev}
