global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: aigateway
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/aigw_metrics_token
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: enterprise-ai-gateway
